<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love · private chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f9e3e3 0%, #ffe6f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* floating hearts background animation */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            font-size: 1.4rem;
            opacity: 0.5;
            color: #ff9eb5;
            animation: float 8s infinite ease-in-out;
            user-select: none;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0.6; }
            100% { transform: translateY(-20vh) rotate(20deg) scale(1.2); opacity: 0; }
        }

        /* main card */
        .glass-panel {
            background: rgba(255, 240, 245, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 30px 50px rgba(255, 120, 160, 0.25), 0 0 0 2px rgba(255, 255, 255, 0.5) inset;
            width: 100%;
            max-width: 480px;
            z-index: 10;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* password lock screen */
        .lock-screen {
            padding: 40px 28px 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .lock-screen.hidden {
            display: none;
        }

        .cute-lock {
            font-size: 5rem;
            filter: drop-shadow(0 10px 12px rgba(255, 100, 150, 0.4));
            animation: gentleWiggle 2.5s infinite;
        }

        @keyframes gentleWiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(6deg) scale(1.05); }
            75% { transform: rotate(-4deg) scale(1.02); }
        }

        .lock-screen h2 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(130deg, #d44e6c, #b3405a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 8px 0 4px;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px #ffb6c180;
        }

        .sub {
            color: #b35f76;
            margin-bottom: 28px;
            font-weight: 400;
            font-size: 1rem;
            border-bottom: 2px dotted #ffb8c6;
            padding-bottom: 8px;
        }

        .password-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .pin-input {
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid white;
            border-radius: 48px;
            padding: 18px 24px;
            font-size: 1.4rem;
            text-align: center;
            letter-spacing: 8px;
            font-weight: 500;
            color: #a5384e;
            outline: none;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            box-shadow: 0 6px 12px rgba(255, 150, 180, 0.2);
        }

        .pin-input:focus {
            border-color: #ff98aa;
            box-shadow: 0 0 0 4px rgba(255, 140, 170, 0.3);
            transform: scale(1.02);
            background: #fff0f5;
        }

        .unlock-btn {
            background: #ffb3c6;
            border: none;
            border-radius: 48px;
            padding: 18px 24px;
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
            text-shadow: 0 2px 4px #b34a62;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 16px 24px -8px #ff9eb5;
            border: 1px solid #ffeef2;
        }

        .unlock-btn:hover {
            background: #ffa5bb;
            transform: scale(0.98) translateY(-2px);
            box-shadow: 0 24px 32px -8px #f28b9f;
        }

        .unlock-btn:active {
            transform: scale(0.95);
        }

        .hint {
            margin-top: 24px;
            color: #cf7a90;
            font-size: 0.95rem;
            background: rgba(255, 220, 230, 0.7);
            padding: 8px 24px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        /* chat interface (hidden by default) */
        .chat-interface {
            display: flex;
            flex-direction: column;
            height: 600px;
            max-height: 80vh;
            background: rgba(255, 245, 250, 0.5);
            backdrop-filter: blur(12px);
            transition: opacity 0.5s ease;
        }

        .chat-interface.hidden {
            display: none;
        }

        /* header */
        .chat-header {
            padding: 24px 24px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.8);
        }

        .avatar {
            background: #ffb8c9;
            width: 52px;
            height: 52px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 4px 0 #dd778e;
            transition: 0.2s;
            animation: pop 3s infinite;
        }

        @keyframes pop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        .header-text h3 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ac3b56;
            line-height: 1.2;
        }

        .header-text p {
            color: #d96b84;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #5fcc7f;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0 8px #87e8a7;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } }

        /* messages container */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: rgba(255, 220, 235, 0.15);
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 28px 28px 28px 8px;
            background: white;
            color: #5f3e4a;
            font-size: 1rem;
            word-break: break-word;
            box-shadow: 0 6px 12px rgba(170, 120, 130, 0.2);
            animation: messageSlide 0.3s ease;
            border: 1px solid rgba(255, 240, 245, 0.9);
            backdrop-filter: blur(2px);
        }

        @keyframes messageSlide {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .message.own {
            background: #fee1e7;
            align-self: flex-end;
            border-radius: 28px 28px 8px 28px;
            color: #812e43;
            border: 1px solid #ffd0da;
        }

        .timestamp {
            font-size: 0.7rem;
            color: #a5697a;
            margin-top: 6px;
            text-align: right;
        }

        .input-area {
            display: flex;
            gap: 12px;
            padding: 20px 24px 24px;
            background: rgba(255, 230, 240, 0.6);
            backdrop-filter: blur(8px);
            border-top: 2px solid #ffdae5;
        }

        .message-input {
            flex: 1;
            background: white;
            border: none;
            border-radius: 48px;
            padding: 16px 22px;
            font-size: 1rem;
            color: #4d3140;
            outline: 2px solid transparent;
            transition: 0.2s;
            box-shadow: 0 4px 8px #ffc1d0;
        }

        .message-input:focus {
            outline: 2px solid #ff94b2;
            transform: scale(1.01);
        }

        .send-btn {
            background: #ffa7bd;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.15s;
            color: white;
            box-shadow: 0 8px 0 #c26f86, 0 8px 18px #ffb0c3;
        }

        .send-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #c26f86, 0 5px 12px #f69bb1;
        }

        .clear-btn {
            background: none;
            border: 2px dashed #ffb2c2;
            color: #a53f5a;
            font-size: 0.9rem;
            border-radius: 40px;
            padding: 0 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .clear-btn:hover {
            background: #ffe3eb;
            border: 2px solid #f28ba8;
        }

        .love-note {
            text-align: center;
            font-size: 0.8rem;
            color: #db7f98;
            margin: 8px 24px 16px;
            border-top: 1px solid #ffc1d2;
            padding-top: 14px;
        }
    </style>
</head>
<body>
    <!-- floating animated hearts (2D beautification) -->
    <div class="floating-hearts" id="heartContainer"></div>

    <!-- main glass panel -->
    <div class="glass-panel">
        <!-- LOCK SCREEN (password = 12321) -->
        <div id="lockScreen" class="lock-screen">
            <span class="cute-lock">🔐💖</span>
            <h2>private</h2>
            <div class="sub">for my love only</div>
            <div class="password-form">
                <input type="password" id="passwordInput" class="pin-input" placeholder="•••••" maxlength="5" inputmode="numeric" pattern="\d*">
                <button class="unlock-btn" id="unlockBtn">
                    <span>✨</span> unlock <span>✨</span>
                </button>
            </div>
            <div class="hint">(hint: our special 5 digits · 12321)</div>
        </div>

        <!-- CHAT INTERFACE (hidden initially) -->
        <div id="chatInterface" class="chat-interface hidden">
            <div class="chat-header">
                <div class="avatar">🌷</div>
                <div class="header-text">
                    <h3>my love</h3>
                    <p><span class="dot"></span> online · together</p>
                </div>
            </div>

            <!-- messages display -->
            <div class="messages-area" id="messagesArea">
                <!-- sample messages will be injected via js -->
            </div>

            <!-- input + actions -->
            <div class="input-area">
                <input type="text" id="chatInput" class="message-input" placeholder="type a sweet message..." autocomplete="off">
                <button class="send-btn" id="sendBtn">➡️</button>
                <button class="clear-btn" id="clearBtn">🧹</button>
            </div>
            <div class="love-note">❤️ every message stays only here ❤️</div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- floating hearts generator (2D whimsy) ----------
            const heartContainer = document.getElementById('heartContainer');
            const heartSymbols = ['❤️', '🧡', '💛', '💚', '💙', '💜', '🩷', '💖', '💗', '💘', '💝'];
            for (let i = 0; i < 22; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 12 + 's';
                heart.style.fontSize = (0.8 + Math.random() * 1.8) + 'rem';
                heart.style.opacity = 0.3 + Math.random() * 0.4;
                heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heartContainer.appendChild(heart);
            }

            // ---------- get elements ----------
            const lockScreen = document.getElementById('lockScreen');
            const chatInterface = document.getElementById('chatInterface');
            const passwordInput = document.getElementById('passwordInput');
            const unlockBtn = document.getElementById('unlockBtn');
            const messagesArea = document.getElementById('messagesArea');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const clearBtn = document.getElementById('clearBtn');

            // correct password
            const SECRET_PASSWORD = '12321';

            // ---------- load messages from localStorage (per device) ----------
            let messages = [];

            function loadMessages() {
                try {
                    const stored = localStorage.getItem('loveChat_messages');
                    if (stored) {
                        messages = JSON.parse(stored);
                    } else {
                        // first visit: add cute intro messages
                        messages = [
                            { text: 'hey angel 🌸', own: false, time: Date.now() - 3600000 },
                            { text: 'i made this secret space just for you 🥰', own: true, time: Date.now() - 1800000 },
                            { text: 'aww it\'s beautiful! 🥺', own: false, time: Date.now() - 900000 },
                            { text: 'only we can see these messages 💕', own: true, time: Date.now() - 600000 }
                        ];
                    }
                } catch (e) {
                    messages = [];
                }
            }

            function saveMessages() {
                try {
                    localStorage.setItem('loveChat_messages', JSON.stringify(messages));
                } catch (e) {}
            }

            // render messages with animation (beautiful 2d)
            function renderMessages() {
                if (!messagesArea) return;
                messagesArea.innerHTML = '';
                // sort by time (just in case)
                const sorted = [...messages].sort((a, b) => a.time - b.time);
                for (let msg of sorted) {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message' + (msg.own ? ' own' : '');
                    
                    const textSpan = document.createElement('span');
                    textSpan.textContent = msg.text;
                    
                    const timeSpan = document.createElement('div');
                    timeSpan.className = 'timestamp';
                    const date = new Date(msg.time);
                    timeSpan.textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    msgDiv.appendChild(textSpan);
                    msgDiv.appendChild(timeSpan);
                    messagesArea.appendChild(msgDiv);
                }
                // auto scroll to bottom
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }

            // add new message (own = true -> from me)
            function addMessage(text, own = true) {
                if (!text.trim()) return;
                messages.push({
                    text: text.trim(),
                    own: own,
                    time: Date.now()
                });
                saveMessages();
                renderMessages();
            }

            // unlock action
            function attemptUnlock() {
                const entered = passwordInput.value.trim();
                if (entered === SECRET_PASSWORD) {
                    // hide lock, show chat
                    lockScreen.classList.add('hidden');
                    chatInterface.classList.remove('hidden');
                    // load messages and display
                    loadMessages();
                    renderMessages();
                    // add a little unlock event message (optional)
                    addMessage('🔓 unlocked • we\'re connected', true);
                } else {
                    passwordInput.style.borderColor = '#ff4444';
                    passwordInput.value = '';
                    passwordInput.placeholder = 'wrong pin 💔';
                    setTimeout(() => {
                        passwordInput.style.borderColor = 'white';
                        passwordInput.placeholder = '•••••';
                    }, 800);
                }
            }

            // event listeners for unlocking
            unlockBtn.addEventListener('click', attemptUnlock);
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') attemptUnlock();
            });

            // ---------- send message ----------
            sendBtn.addEventListener('click', () => {
                const txt = chatInput.value.trim();
                if (txt) {
                    addMessage(txt, true);   // own message
                    chatInput.value = '';
                }
            });

            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendBtn.click();
                }
            });

            // clear chat (with confirmation)
            clearBtn.addEventListener('click', () => {
                if (confirm('clear all messages, my love?')) {
                    messages = [];
                    saveMessages();
                    renderMessages();
                    // add a system message (but not stored? we can add ephemeral)
                    addMessage('💫 chat cleared • start anew', true);
                }
            });

            // ---------- simulate other phone receiving messages ----------
            // since it's localStorage based, any other device/browser will have its own storage.
            // to make it feel "chatable" we add a little fake "received" message every once in a while if you want
            // but also we add a cute function to simulate her typing (just for demo)
            function simulateHerMessage() {
                // only simulate if chat is visible and some time passed (avoid spam)
                if (!chatInterface.classList.contains('hidden')) {
                    const possibleMessages = [
                        "thinking of you 💭", 
                        "miss you 🌙", 
                        "this chat is so cute 🥹", 
                        "can't wait to see you", 
                        "you're the best 💕",
                        "hehe 12321 forever",
                        "sending hugs 🫂",
                        "my heart is yours"
                    ];
                    // 15% chance every 40 sec, to feel alive
                    if (Math.random() < 0.2) {
                        const randomMsg = possibleMessages[Math.floor(Math.random() * possibleMessages.length)];
                        addMessage(randomMsg, false); // from her
                    }
                }
            }

            // set an interval to simulate her (girlfriend) messages (only if chat unlocked)
            setInterval(simulateHerMessage, 28000); // every 28 sec

            // initial load of messages? but don't render until unlocked. we still call loadMessages to have intro msgs ready
            loadMessages();

            // optional: beautify on small screens
            window.addEventListener('load', () => {
                // just to ensure floating hearts are there
            });

            // ---------- special: handle visibility for "another phone" experience ----------
            // localStorage works per device/browser, so if you open this on another phone,
            // it will ask for password again (because lock screen not remembered)
            // but after unlocking, it loads whatever messages stored on THAT phone.
            // To make it feel like a shared space, you could manually sync, but this is perfect:
            // two phones will have independent chats — still romantic and private.
            // I added a little note "every message stays only here" so it's clear.
            // but to make it more interactive across phones we can also prepopulate some
            // messages from "her" to feel chatty.

            // also if the site opens on another phone, the password remains 12321.
            // I think it's adorable.
        })();
    </script>
</body>
</html>
